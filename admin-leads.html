<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Dashboard | Ray's Heating & Cooling LLC</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--obsidian); }
    .admin-header {
      background: var(--graphite);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 20px 0;
    }
    .admin-header .container { display:flex; justify-content:space-between; align-items:center; gap:16px; }
    .filter-bar { display:flex; gap:12px; align-items:center; margin-bottom:24px; flex-wrap:wrap; }
    .filter-bar input, .filter-bar select {
      font-family: var(--font-body); font-size:13px;
      background: var(--graphite); color: var(--ash);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--r-md); padding:10px 14px;
      outline: none; transition: border-color 0.2s;
    }
    .filter-bar input:focus, .filter-bar select:focus { border-color: var(--ember); }
    .filter-bar select option { background: var(--carbon); }
    .count-badge { font-family: var(--font-display); font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--smoke); }
    .empty-wrap { text-align:center; padding:80px 24px; }
    .empty-wrap h3 { font-family:var(--font-display); font-weight:700; font-size:22px; color:var(--white); margin:16px 0 8px; }
    .empty-wrap p { color:var(--smoke); font-size:14px; }
    .table-scroll { overflow-x:auto; }
  </style>
</head>
<body>
  <div class="admin-header">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C9.5 5 7 7.5 7 11a5 5 0 0010 0c0-3.5-2.5-6-5-9zm0 14a3 3 0 01-3-3c0-1.8 1-3.3 2-4.8 1 1.5 2 3 2 4.8a3 3 0 01-3 3z"/></svg></div>
        <div class="logo-wordmark"><div class="logo-name">Lead Dashboard</div><div class="logo-sub">Ray's Heating & Cooling LLC</div></div>
      </a>
      <div style="display:flex;gap:10px;align-items:center">
        <a href="index.html" style="font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--smoke)">← Back to Site</a>
        <button class="btn btn-fire btn-sm" onclick="exportCSV()">Export CSV</button>
        <button class="btn btn-ghost btn-sm" onclick="clearAll()">Clear All</button>
      </div>
    </div>
  </div>

  <div class="admin-wrap">
    <div class="admin-stat-row" id="statsRow"></div>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Search leads…" oninput="renderTable()" style="flex:1;min-width:200px">
      <select id="serviceFilter" onchange="renderTable()">
        <option value="">All Services</option>
        <option>HVAC Repair</option>
        <option>HVAC Maintenance</option>
        <option>HVAC Installation</option>
        <option>Cleaning & Testing</option>
        <option>Emergency Service</option>
        <option>Free Estimate Only</option>
      </select>
      <span class="count-badge" id="leadCount"></span>
    </div>
    <div class="leads-table-wrap">
      <div class="table-scroll" id="tableContainer"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    function renderStats() {
      const leads = RAYS.getLeads();
      const today = new Date().toLocaleDateString();
      const todayCount = leads.filter(l => l.date && l.date.startsWith(new Date().toLocaleDateString().split(',')[0])).length;
      const svcs = {};
      leads.forEach(l => { if (l.service) svcs[l.service] = (svcs[l.service]||0)+1; });
      const top = Object.keys(svcs).sort((a,b)=>svcs[b]-svcs[a])[0] || '—';
      document.getElementById('statsRow').innerHTML = `
        <div class="admin-stat"><div class="val">${leads.length}</div><div class="lbl">Total Leads</div></div>
        <div class="admin-stat"><div class="val">${todayCount}</div><div class="lbl">Today</div></div>
        <div class="admin-stat"><div class="val" style="font-size:20px;line-height:1.4">${top}</div><div class="lbl">Top Service</div></div>
        <div class="admin-stat"><div class="val">${leads.filter(l=>l.status==='New').length}</div><div class="lbl">New / Unread</div></div>`;
    }

    function renderTable() {
      const leads = RAYS.getLeads();
      const q = document.getElementById('searchInput').value.toLowerCase();
      const svc = document.getElementById('serviceFilter').value;
      const filtered = leads.filter(l => {
        return (!q || JSON.stringify(l).toLowerCase().includes(q)) && (!svc || l.service === svc);
      });
      document.getElementById('leadCount').textContent = `${filtered.length} of ${leads.length} leads`;
      if (!leads.length) {
        document.getElementById('tableContainer').innerHTML = `
          <div class="empty-wrap">
            <div style="font-size:56px">📋</div>
            <h3>No Leads Yet</h3>
            <p>Leads submitted through any form on the website will appear here automatically.</p>
            <a href="index.html" class="btn btn-fire" style="margin-top:24px">Go to Website</a>
          </div>`;
        return;
      }
      if (!filtered.length) {
        document.getElementById('tableContainer').innerHTML = `<div class="empty-wrap"><h3>No Results</h3><p>Try adjusting your search or filter.</p></div>`;
        return;
      }
      const rows = filtered.map(l => `
        <tr>
          <td style="white-space:nowrap">${l.date||'—'}</td>
          <td><strong style="color:var(--white)">${l.name||(l.firstName?(l.firstName+' '+(l.lastName||'))':'—')}</strong></td>
          <td><a href="tel:${(l.phone||'').replace(/\D/g,'')}" style="color:var(--ember-hot)">${l.phone||'—'}</a></td>
          <td><a href="mailto:${l.email||''}" style="color:var(--ash)">${l.email||'—'}</a></td>
          <td>${l.service||'—'}</td>
          <td>${l.urgency||'—'}</td>
          <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.message||''}">${l.message||'—'}</td>
          <td><span class="badge-new">${l.status||'New'}</span></td>
          <td><button class="del-btn" onclick="deleteLead(${l.id})" title="Delete">🗑</button></td>
        </tr>`).join('');
      document.getElementById('tableContainer').innerHTML = `
        <table class="leads-table">
          <thead><tr><th>Date</th><th>Name</th><th>Phone</th><th>Email</th><th>Service</th><th>Urgency</th><th>Message</th><th>Status</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function deleteLead(id) {
      if (!confirm('Delete this lead?')) return;
      RAYS.saveLeads(RAYS.getLeads().filter(l => l.id !== id));
      renderStats(); renderTable();
    }

    function clearAll() {
      if (!confirm('Delete ALL leads? This cannot be undone.')) return;
      RAYS.saveLeads([]);
      renderStats(); renderTable();
    }

    function exportCSV() {
      const leads = RAYS.getLeads();
      if (!leads.length) { alert('No leads to export.'); return; }
      const hdrs = ['Date','Name','Phone','Email','Service','Urgency','Address','System Type','Message','Status'];
      const rows = leads.map(l => [
        l.date||'', l.name||(l.firstName?(l.firstName+' '+(l.lastName||'')):''),
        l.phone||'', l.email||'', l.service||'', l.urgency||'',
        l.address||'', l.systemType||'', (l.message||'').replace(/,/g,' '), l.status||'New'
      ].map(v=>`"${v}"`).join(','));
      const blob = new Blob([[hdrs.join(','),...rows].join('\n')], {type:'text/csv'});
      const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:`rays-leads-${new Date().toISOString().slice(0,10)}.csv`});
      a.click(); URL.revokeObjectURL(a.href);
    }

    // Seed demo lead if empty
    if (!RAYS.getLeads().length) {
      RAYS.saveLeads([{
        id: Date.now(), date: new Date().toLocaleString(), status: 'New',
        name: 'Demo Lead — Submit a form to see real leads',
        phone: '(203) 555-0100', email: 'demo@example.com',
        service: 'HVAC Repair', urgency: 'Today',
        message: 'Sample entry. Real leads appear here when customers submit any form on the site.'
      }]);
    }

    renderStats(); renderTable();
  </script>
</body>
</html>
